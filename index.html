<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notino Competitor Analysis Reports</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 60px 40px;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      color: #ffffff;
    }
    p {
      color: #808080;
      font-size: 15px;
      margin-bottom: 48px;
    }
    .reports {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a.card {
      display: block;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 32px 40px;
      text-decoration: none;
      color: inherit;
      width: 220px;
      transition: border-color 0.2s, transform 0.2s;
    }
    a.card:hover {
      border-color: #DC0069;
      transform: translateY(-2px);
    }
    .flag { font-size: 40px; margin-bottom: 16px; }
    .country {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #ffffff;
    }
    .label {
      font-size: 13px;
      color: #808080;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://brand.notino.com/content/1_logotypes-and-claim/3_logotype-notino-partner/notino-partner-logotype-1.svg" alt="Notino Partner" width="200" style="display:block;margin:0 auto 32px">
    <h1>Market Reports</h1>
    <p>Select your market</p>
    <div class="reports">
      <a class="card" href="austria.html">
        <div class="flag">🇦🇹</div>
        <div class="country">Austria</div>
        <div class="label">View report</div>
      </a>
      <a class="card" href="croatia.html">
        <div class="flag">🇭🇷</div>
        <div class="country">Croatia</div>
        <div class="label">View report</div>
      </a>
    </div>
    <div style="width:200px;height:1px;background:#2a2a2a;margin:36px auto"></div>
    <div class="reports" style="margin-top:36px">
      <a class="card" href="marketing-planning.html" style="background:#111111;width:auto;max-width:480px">
        <div class="flag">🎯</div>
        <div class="country">Marketing Planning Session</div>
        <div class="label">B2B strategy · Austria &amp; Croatia</div>
        <div class="label" style="margin-top:10px;color:#DC0069;font-weight:500">Open session →</div>
      </a>
    </div>
  </div>
</body>
</html>
