<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notino Competitor Analysis Reports</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 60px 40px;
    }
    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    p {
      color: #888;
      font-size: 15px;
      margin-bottom: 48px;
    }
    .reports {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a.card {
      display: block;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 32px 40px;
      text-decoration: none;
      color: inherit;
      width: 220px;
      transition: border-color 0.2s, transform 0.2s;
    }
    a.card:hover {
      border-color: #555;
      transform: translateY(-2px);
    }
    .flag { font-size: 40px; margin-bottom: 16px; }
    .country {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .label {
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Notino</div>
    <h1>Competitor Analysis</h1>
    <p>Market reports by country</p>
    <div class="reports">
      <a class="card" href="austria.html">
        <div class="flag">🇦🇹</div>
        <div class="country">Austria</div>
        <div class="label">View report</div>
      </a>
      <a class="card" href="croatia.html">
        <div class="flag">🇭🇷</div>
        <div class="country">Croatia</div>
        <div class="label">View report</div>
      </a>
    </div>
  </div>
</body>
</html>
